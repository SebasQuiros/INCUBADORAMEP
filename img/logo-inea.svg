<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" role="img" aria-label="INEA — Incubadora de Negocios de Alajuela">
  <style>
    .inea-word { font-family: 'Poppins','Arial Black',sans-serif; font-weight: 800; }
    .inea-sub  { font-family: 'Poppins','Arial',sans-serif; font-weight: 600; letter-spacing: 2px; }
  </style>

  <!-- humo -->
  <path d="M196 92 C188 80 200 74 196 62 C192 52 204 46 200 36" fill="none" stroke="#9aa3ab" stroke-width="5" stroke-linecap="round"/>

  <!-- montaña -->
  <path d="M110 196
           L196 84 L226 128 L258 70 L300 132 L338 96 L372 140 L404 104 L470 196 Z"
        fill="#3a4a5a"/>
  <!-- nieve / picos claros -->
  <path d="M258 70 L300 132 L284 132 L272 112 L258 132 L246 116 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M372 140 L404 104 L470 196 L430 196 L404 150 L388 168 Z" fill="#2f3d4b"/>

  <!-- barra verde (acento de la I) -->
  <rect x="92" y="214" width="34" height="118" rx="4" fill="#5aa432"/>

  <!-- texto INEA -->
  <text x="140" y="324" class="inea-word" font-size="150" fill="#3a4a5a">NEA</text>

  <!-- swoosh amarillo -->
  <path d="M470 320 C520 296 560 296 600 322 C566 308 524 308 470 332 Z" fill="#f5b800"/>

  <!-- línea inferior -->
  <line x1="92" y1="346" x2="600" y2="346" stroke="#3a4a5a" stroke-width="4"/>

  <!-- subtítulo -->
  <text x="92" y="372" class="inea-sub" font-size="22" fill="#3a4a5a">INCUBADORA DE NEGOCIOS DE ALAJUELA</text>
</svg>
